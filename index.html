<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Card - Functionality</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="card-container" id="cardContainer">
            <div class="card" id="card">
                <div class="card-face card-front">
                    <div class="icon">😃</div>
                    <h2>Hello Explorer!</h2>
                    <p>Wlecome to the world of CSS Transitions. Click this card to discover whats inside the other side.</p>
                    <div class="hint">Click to Flip</div>
                </div>
                <div class="card-face card-back">
                    <div class="icon">🤯</div>
                    <h2>You found it!</h2>
                    <p>Great job this is the back of the card. CSS 3D transforms make this smooth flipeffect possible.</p>
                    <div class="hint">Click to Flip</div>
                </div>
            </div>
        </div>

    <script src="script.js"></script>
</body>
</html>
